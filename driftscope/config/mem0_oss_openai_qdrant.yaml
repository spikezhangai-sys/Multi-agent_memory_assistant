# Mem0 OSS baseline config for LongMemEval.
#
# This is consumed by:
#   driftscope-longmemeval ... --baseline mem0 --mem0-mode oss --mem0-config driftscope/config/mem0_oss_openai_qdrant.yaml
#
# Mostly aligned with driftscope/config/default.yaml:
#   Mem0 extraction LLM override: DeepSeek V4 Flash on OpenRouter
#   retrieval.embedding_backend/model/dim: local BAAI/bge-large-en-v1.5, 1024
#   retrieval.top_k: 20, passed via CLI default --mem0-top-k
#
# Required .env entry for Mem0's extraction LLM:
#   OPENROUTER_API_KEY=...
#
# The --backend/--model flags in driftscope-longmemeval only control the final
# answer generator used by this repo. Mem0's own extraction and embedding calls
# are controlled here.

version: v1.1

vector_store:
  provider: qdrant
  config:
    collection_name: driftscope_longmemeval_mem0
    path: /tmp/driftscope-mem0-qdrant
    embedding_model_dims: 1024
    on_disk: true

llm:
  provider: openai
  config:
    model: deepseek/deepseek-v4-flash
    temperature: 0.0
    max_tokens: 2000
    openrouter_base_url: https://openrouter.ai/api/v1
    site_url: http://localhost
    app_name: DriftScope

embedder:
  provider: huggingface
  config:
    model: BAAI/bge-large-en-v1.5
    embedding_dims: 1024

history_db_path: /tmp/driftscope-mem0-history.db
