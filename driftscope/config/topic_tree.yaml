categories:
  - id: user.profile
    description: 用户的稳定身份信息 —— 居住地、教育背景、家庭结构、长期身份属性等
    default_type: fact

  - id: user.preference
    description: 用户的口味、爱好、审美、常用工具、工作方式、沟通风格等偏好
    default_type: preference

  - id: user.constraint
    description: 用户明确的硬性限制 —— 过敏、忌口、时间禁忌、身体状况限制等
    default_type: constraint

  - id: user.activity
    description: 用户的离散事件或近期活动 —— 跑腿、运动、参观、社交、出行等一次性或周期性事件
    default_type: episodic

  - id: user.metric
    description: 用户的量化指标 —— 成绩、配速、排名、分数、个人最佳等可比较数值
    default_type: fact

  - id: user.communication
    description: 用户偏好的交互方式 —— 语气、回复长度、结构化程度、称呼等
    default_type: preference

  - id: user.possessions
    description: 用户拥有、购买、订阅或持有的具体物品、服务、房产、车辆、电子设备、会员、订单等有所有权或订阅关系的对象
    default_type: fact

  - id: user.relationships
    description: 用户生活中的人与宠物 —— 家人、伴侣、朋友、同事、养的动物 —— 及与之绑定的事实与事件
    default_type: fact

  - id: user.health
    description: 用户的健康状况、药物、治疗、医疗访问、身体状态 —— 不含饮食忌口（那归 user.constraint.diet）
    default_type: fact

  - id: project.context
    description: 具体项目的上下文 —— 技术栈、截止时间、里程碑、客户要求、团队约定等
    default_type: fact

  - id: project.operations
    description: 项目运作层面的事实 —— 排班、轮班、值班表、运营流程等
    default_type: fact

seed_leaves:
  - path: user.profile.location
    description: 用户当前居住地、长期所在城市或搬家信息
    examples:
      - 我现在住在上海
      - I moved to New York last month.
    keywords:
      - 住在
      - 搬家
      - 搬到
      - 城市
      - location
      - moved
      - relocated

  - path: user.profile.education
    description: 用户的学历、专业、学位或毕业背景
    examples:
      - 我学的是计算机科学
      - I graduated with a degree in Business Administration.
    keywords:
      - degree
      - major
      - graduated
      - graduation
      - education
      - university
      - college
      - 学位
      - 专业
      - 毕业

  - path: user.preference.food
    description: 用户的食物口味与饮食偏好
    examples:
      - 我最近喜欢吃日料
      - I really enjoy Korean BBQ lately.
    keywords:
      - 日料
      - 食物
      - 口味
      - 吃
      - cuisine
      - dish
      - flavor

  - path: user.preference.workstyle
    description: 用户偏好的工作方式、协作节奏、办公模式或会议习惯
    examples:
      - 我更喜欢远程工作
      - 我习惯早上开会
    keywords:
      - 远程
      - 工作方式
      - 协作
      - 开会
      - remote
      - hybrid
      - office
      - commute

  - path: user.preference.software
    description: 用户偏好或常用的软件、工具、应用、创作流程与编辑环境
    examples:
      - 我更喜欢用某款剪辑软件做视频
      - I enjoy using VS Code for daily work.
    keywords:
      - software
      - tool
      - app
      - application
      - editor
      - ide
      - adobe
      - premiere
      - 剪辑
      - 软件
      - 工具

  - path: user.constraint.diet
    description: 用户明确的饮食限制、过敏或忌口
    examples:
      - 我对花生过敏
      - 我不能吃太辣
