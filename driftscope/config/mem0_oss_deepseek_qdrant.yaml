# Mem0 OSS baseline config using DeepSeek official API.
#
# This is consumed by:
#   driftscope-longmemeval ... --baseline mem0 --mem0-mode oss --mem0-config driftscope/config/mem0_oss_deepseek_qdrant.yaml
#
# Required .env entry for Mem0's extraction LLM:
#   DEEPSEEK_API_KEY=...

version: v1.1

vector_store:
  provider: qdrant
  config:
    collection_name: driftscope_longmemeval_mem0_deepseek
    path: /tmp/driftscope-mem0-qdrant-deepseek
    embedding_model_dims: 1024
    on_disk: true

llm:
  provider: deepseek
  config:
    model: deepseek-v4-flash
    temperature: 0.0
    max_tokens: 2000
    deepseek_base_url: https://api.deepseek.com

embedder:
  provider: huggingface
  config:
    model: BAAI/bge-large-en-v1.5
    embedding_dims: 1024

history_db_path: /tmp/driftscope-mem0-history-deepseek.db
