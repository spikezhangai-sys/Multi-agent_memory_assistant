# Mem0 OSS baseline config for LongMemEval — GPT-4o-mini extraction LLM via OpenRouter.
#
# Usage:
#   driftscope-longmemeval ... --baseline mem0 --mem0-mode oss \
#       --mem0-config driftscope/config/mem0_oss_gpt4omini_qdrant.yaml
#
# Required .env entry:
#   OPENROUTER_API_KEY=...

version: v1.1

vector_store:
  provider: qdrant
  config:
    collection_name: driftscope_longmemeval_mem0
    path: /tmp/driftscope-mem0-qdrant
    embedding_model_dims: 1024
    on_disk: true

llm:
  provider: openai
  config:
    model: openai/gpt-4o-mini
    temperature: 0.0
    max_tokens: 2000
    openrouter_base_url: https://openrouter.ai/api/v1
    site_url: http://localhost
    app_name: DriftScope

embedder:
  provider: huggingface
  config:
    model: BAAI/bge-large-en-v1.5
    embedding_dims: 1024
    model_kwargs:
      device: cuda

history_db_path: /tmp/driftscope-mem0-history.db
